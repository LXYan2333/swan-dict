name: Build Package Artifacts

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-package:
    name: Build ${{ matrix.distro }} package
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            container: debian:13
          - distro: ubuntu
            container: ubuntu:26.04
          - distro: fedora
            container: fedora:44
          - distro: arch
            container: archlinux:latest

    steps:
      - name: Install checkout tools
        run: |
          case "${{ matrix.distro }}" in
            debian|ubuntu)
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates git tar xz-utils
              ;;
            fedora)
              dnf -y install ca-certificates git tar xz
              ;;
            arch)
              pacman -Sy --noconfirm ca-certificates git tar xz
              ;;
          esac

      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build package
        run: |
          packaging/ci/build-package.sh "${{ matrix.distro }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swan-dict-${{ matrix.distro }}
          path: dist/${{ matrix.distro }}/*
          if-no-files-found: error
